<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <!-- Font Awesome (optional für Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #2b5876, #4e4376);
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 span.first {
            color: #aaa;
            font-weight: 300;
        }

        h1 span.last {
            color: #fff;
            font-weight: 600;
        }

        p {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .motto {
            font-style: italic;
            color: #aaa;
            margin-bottom: 40px;
            display: block;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            opacity: 0.8;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-size: 0.9rem;
            color: #aaa;
        }

        .footer span {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">
        <i class="fas fa-code"></i>
    </div>

    <h1>
        <span class="first">Something</span>
        <span class="last">is coming</span>
    </h1>

    <span class="motto">Code is poetry</span>

    <p>
        This page is currently under construction.<br>
        Secret content is on its way!
    </p>

    <p>
        Check back soon for more exciting updates!
    </p>
</div>

<div class="footer">
    <span>&copy; 2026 Erik Berndt</span>
</div>

</body>
</html>
